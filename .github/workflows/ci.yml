name: CI Pipeline - Universal DE Activation Comparison

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['1.10', '1.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      
      - uses: julia-actions/cache@v2
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/packages
          key: ${{ runner.os }}-${{ matrix.version }}-${{ hashFiles('**/Project.toml') }}
      
      - name: Install dependencies
        run: julia --project=@. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'
      
      - name: Run UDE Activation Comparison
        run: julia --project=@. 3-activations-comp.jl
        timeout-minutes: 45
      
      - name: Verify outputs
        run: |
          for file in infected_recovered_comparison.png convergence_comparison.png relu_predictions.png tanh_predictions.png sigmoid_predictions.png comparison_results.jld2; do
            if [ -f "$file" ]; then
              echo "✅ $file generated"
            else
              echo "❌ Missing $file"
              exit 1
            fi
          done
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ude-activation-results-julia-${{ matrix.version }}
          path: |
            *.png
            *.jld2
          retention-days: 7
